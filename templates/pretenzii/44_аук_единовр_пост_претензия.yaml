template: 44_аук_единовр_пост_претензия.docx
title: "Претензия — аукцион 44-ФЗ, единовременная поставка с просрочкой"
description: "После заполнения формируется пакет из трёх документов: претензия + служебная записка + решение."

# Теги анкеты-навигатора (этап 8). Сшиваются с templates/pretenzii/_wizard.yaml.
# Ветвь «первая поставка» — ось количество_частичных не указывается.
tags:
  закон: 44
  процедура: аукцион
  тип_поставки: первая

# Пакет из трёх .docx из одной формы (этап 8.8). Переменные общие.
extra_templates:
  - template: 44_аук_единовр_пост_сз_счет.docx
    output_filename:
      pattern: "СЗ_{наименование_контрагента}_{date}.docx"
      fields: [наименование_контрагента]
  - template: 44_аук_единовр_пост_решение.docx
    output_filename:
      pattern: "Решение_{наименование_контрагента}_{date}.docx"
      fields: [наименование_контрагента]

output_filename:
  pattern: "Претензия_{наименование_контрагента}_{date}.docx"
  fields: [наименование_контрагента]

fields:

  # ───────── Адресат (контрагент-поставщик) ─────────

  - name: должность_адресата_дат
    label: "Должность руководителя контрагента (дат. падеж)"
    type: text
    required: true
    placeholder: "Генеральному директору"
    help_text: ""

  - name: наименование_контрагента
    label: "Наименование контрагента"
    type: text
    required: true
    placeholder: "ООО «ПОСТАВЩИК»"
    help_text: ""

  - name: фио_адресата_дат
    label: "ФИО руководителя контрагента (дат. падеж)"
    type: text
    required: true
    placeholder: "Иванову Михаилу Васильевичу"

  - name: адрес_юр_лица
    label: "Адрес юридического лица"
    type: textarea
    required: true
    help_text: "В соответствии с договором"

  - name: почтовый_адрес
    label: "Почтовый адрес"
    type: textarea
    required: false
    help_text: "При наличии. Если пусто — строка в претензии не выводится."

  - name: огрн
    label: "ОГРН"
    type: text
    required: true

  - name: инн
    label: "ИНН"
    type: text
    required: true

  - name: email_контрагента
    label: "Адрес электронной почты"
    type: text
    required: true

  - name: телефон_контрагента
    label: "Телефон"
    type: text
    required: true

  # ───────── Договор ─────────

  - name: номер_договора
    label: "Номер договора"
    type: text
    required: true
    placeholder: "84 ОАЭФ/25М-1453"
    help_text: "без символа N"

  - name: дата_договора
    label: "Дата заключения договора"
    type: date
    required: true
    help_text: ""

  - name: подписант_договора_заказчика
    label: "Кем подписан договор со стороны Заказчика (для служебной записки)"
    type: textarea
    required: false
    placeholder: "подписан Н.Б. Гришановой по приказу № 1143-к от 27.10.2025 за С.Б. Адаксину"
    help_text: "Только если договор подписан по доверенности/приказу."

  # ───────── Сроки и факт поставки ─────────

  - name: способ_срока
    label: "Как задан срок поставки в контракте"
    type: radio
    required: true
    options: ["В днях", "Конкретной датой"]
    help_text: ""

  - name: срок_исполнения_дней
    label: "Срок поставки по контракту, дней"
    type: number
    required: true
    visible_if: "способ_срока == 'В днях'"
    help_text: ""

  - name: дата_дедлайна_вручную
    label: "Дата поставки по договору"
    type: date
    required: true
    visible_if: "способ_срока == 'Конкретной датой'"
    help_text: ""

  - name: пункт_контракта_срок
    label: "Пункт контракта о сроке поставки"
    type: text
    required: true
    placeholder: "6.1.3"

  - name: дата_поставки
    label: "Дата фактической поставки"
    type: date
    required: true
    help_text: ""

  - name: количество_поставки
    label: "Количество поставленного товара"
    type: number
    required: true

  - name: единица_измерения
    label: "Единица измерения"
    type: text
    required: true
    placeholder: "шт./м./компл. и т.д."

  - name: сумма_поставки
    label: "Сумма поставки, руб."
    type: number
    required: true
    placeholder: "100345,70"
    help_text: "Вводить числом (например: 100345,70)"

  - name: номер_дата_акта_отв_хранения
    label: "Номер и дата акта приёма на ответственное хранение"
    type: text
    required: false
    placeholder: "б/№ от 27.03.2026"
    help_text: "Если не было акта отв. хранения - оставить поле пустым"

  - name: дата_акта_отв_хранения
    label: "Дата подписания акта отв. хранения Заказчиком"
    type: date
    required: false
    help_text: "Если не было акта отв. хранения - оставить поле пустым"

  - name: номер_дата_документа_приемки
    label: "Номер и дата документа о приёмке"
    type: text
    required: true
    placeholder: "№ 90 от 01.04.2026"

  - name: дата_документа_приемки
    label: "Дата подписания документа о приёмке Заказчиком"
    type: date
    required: true

  # ───────── Расчёт пени ─────────

  - name: пункт_контракта_неустойка
    label: "Пункт контракта о неустойке (пене)"
    type: text
    required: true
    placeholder: "3.4.2"

  - name: ставка_цб
    label: "Ставка ЦБ (ключевая), %"
    type: number
    required: true
    placeholder: "14,5"
    help_text: "Действующая на дату расчёта"

  # ───────── Обеспечение (концовка претензии) ─────────

  - name: обеспечение_нг
    label: "Вид обеспечения исполнения контракта"
    type: radio
    required: true
    # value уходит в .docx (truthy/falsy для {#обеспечение_нг}/{^обеспечение_нг}),
    # оператор видит label. «Да»→НГ (независимая гарантия), «Нет»→ПП (удержание деньгами).
    options:
      - { value: "Да", label: "Независимая гарантия (НГ)" }
      - { value: "Нет", label: "Удержание из обеспечения деньгами (ПП)" }
    help_text: "НГ → концовка про требование по независимой гарантии. ПП → концовка про удержание из обеспечения в виде денежных средств."

  # ───────── Подписант претензии ─────────

  - name: фио_исполнителя
    label: "Исполнитель от ОГЗ"
    type: text
    required: true
    placeholder: "Петрова О.О."

  # ───────── Служебная записка (доп. поля) ─────────

  - name: срок_передачи_счета
    label: "Срок передачи счёта в ОГЗ (для служебной записки)"
    type: date
    required: true
    help_text: "В служебной записке: «СРОК ПЕРЕДАЧИ В ОГЗ СЧЕТА НЕ ПОЗДНЕЕ:»"

  # ───────── Расчётные блоки ─────────
  # Порядок важен: сначала срок/просрочка, её выход «дней_просрочки» —
  # вход для расчёта пени.

  # Развилка по способу задания срока (variant_group: срок). В шаблоне активен
  # ровно один блок — оба пишут срок_поставки_истек/дней_просрочки.

  - name: блок_расчёт_сроков
    label: "Расчёт дней просрочки"
    type: calculator
    calculator: delivery_overdue
    visible_if: "способ_срока == 'В днях'"
    variant_group: срок
    inputs:
      дата_договора: дата_договора
      срок_исполнения_дней: срок_исполнения_дней
      дата_фактического_исполнения: дата_поставки
    outputs:
      дата_дедлайна: срок_поставки_истек        # «Срок поставки истёк {срок_поставки_истек}»
      дней_просрочки: дней_просрочки             # вход для расчёта пени + текст
      срок_исполнения_прописью: срок_исполнения_прописью  # не используется в .docx, но маппить обязательно
    # Оператору показываем только дни просрочки (дата дедлайна и пропись уходят в .docx).
    display_outputs:
      - дней_просрочки

  - name: блок_расчёт_сроков_дата
    label: "Расчёт дней просрочки"
    type: calculator
    calculator: overdue_from_deadline
    visible_if: "способ_срока == 'Конкретной датой'"
    variant_group: срок
    inputs:
      дата_дедлайна: дата_дедлайна_вручную
      дата_фактического_исполнения: дата_поставки
    outputs:
      дата_дедлайна_формат: срок_поставки_истек  # тот же {срок_поставки_истек}
      дней_просрочки: дней_просрочки             # вход для расчёта пени + текст
    display_outputs:
      - дней_просрочки
      
  - name: блок_расчёт_пени
    label: "Расчёт пени"
    type: calculator
    calculator: penalty_44fz_part6
    inputs:
      сумма_контракта: сумма_поставки
      дней_просрочки: дней_просрочки
      ставка_цб: ставка_цб
    outputs:
      сумма_неустойки: сумма_пени                # «32 009,75»
      сумма_неустойки_руб: сумма_пени_руб        # «32 009»
      сумма_неустойки_коп: сумма_пени_коп        # «75»
      сумма_неустойки_прописью: сумма_пени_прописью  # «Тридцать две тысячи девять»
      сумма_базы_формат: сумма_поставки_формат   # «655 713,48»
      ставка_формат: ставка_формат               # «14,5»
      расчёт_подробно: расчет_подробно           # не используется в .docx, но маппить обязательно
    # Оператору в карточке показываем только расчёт и итог (остальные выходы уходят в .docx).
    display_outputs:
      - расчёт_подробно
      - сумма_неустойки
