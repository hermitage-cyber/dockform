template: Претензия_шаблон.docx
title: "Претензия по нарушению сроков поставки"
description: "Договор 44-ФЗ, п. 4 ч. 1 ст. 93. Пеня по п. 8.2 договора"

# ⚠️ Перед публикацией шаблона надо поправить .docx (см. CLAUDE.md и
# docs/template-authoring.md):
#   1) Сохранить файл как .docx (не .doc) через Word: «Файл → Сохранить как…
#      → Документ Word (*.docx)». docxtemplater работает только с .docx.
#   2) {предмет договора} → {предмет_договора}   — в имени переменной пробел,
#      его надо убрать (имена не должны содержать пробелов).
#   3) (дней_просрочки_буквами) → {дней_просрочки_буквами}  — нет фигурных скобок,
#      docxtemplater пропустит это место без замены.
#   4) После правок: применить Ctrl+A → Ctrl+Space, чтобы объединить runs
#      и плейсхолдеры не остались разорванными.

output_filename:
  pattern: "Претензия_{наименование_контрагента_краткое}_{date}.docx"
  fields: [наименование_контрагента_краткое]

fields:

  # ───────── Реквизиты ─────────

  - name: кому
    label: "Кому (адресат претензии)"
    type: textarea
    required: true
    placeholder: "ООО «Поставщик»\nген. директору А.А. Иванову"

  - name: реквизиты_шапка
    label: "Реквизиты шапки"
    type: textarea
    required: true
    help_text: "Адрес, ИНН, КПП, контактные данные — что указано в Договоре"

  - name: номер_договора
    label: "Номер договора"
    type: text
    required: true

  - name: дата_договора
    label: "Дата договора"
    type: date
    required: true

  - name: предмет_договора
    label: "Предмет договора (в винительном падеже: «поставку товаров»)"
    type: text
    required: true
    help_text: "В тексте: «договора № … на {предмет_договора}»"

  - name: наименование_контрагента_полное
    label: "Наименование контрагента (полное)"
    type: text
    required: true
    placeholder: "Общество с ограниченной ответственностью «Поставщик»"

  - name: наименование_контрагента_краткое
    label: "Наименование контрагента (краткое)"
    type: text
    required: true
    placeholder: "ООО «Поставщик»"

  - name: обязательства_по_
    label: "Обязательства по… (дательный падеж)"
    type: text
    required: true
    placeholder: "поставке товаров"
    help_text: "В тексте: «приняло на себя {обязательства_по_} в срок…»"

  # ───────── Сроки и факт поставки ─────────

  - name: дней_просрочки_числом
    label: "Срок исполнения по договору, дней"
    type: number
    required: true
    help_text: "Сколько дней даётся поставщику с момента заключения договора (п. 6.1.1)"

  - name: дата_1_поставки
    label: "Дата фактической поставки"
    type: date
    required: true

  - name: количество_1_поставки
    label: "Количество поставленного товара, шт."
    type: number
    required: true

  - name: сумма_1_поставки
    label: "Сумма поставки, руб."
    type: number
    required: true

  - name: номер_дата_тов_накл
    label: "Номер и дата товарной накладной"
    type: text
    required: true
    placeholder: "№123 от 15.02.2026"

  # ───────── Пеня (вход для калькулятора) ─────────

  - name: процент_пени_договор
    label: "Процент пени в день, % (по п. 8.2 договора)"
    type: number
    required: true
    placeholder: "0.3"
    help_text: "В типовом договоре Эрмитажа — 0,3. Если иной — поправить здесь и в тексте п. 8.2 .docx."

  # ───────── Подписант ─────────

  - name: зам
    label: "Подписант (зам. ген. директора)"
    type: dictionary
    source: deputies
    required: true
    display: "{position} — {fio_im}"
    fills:
      fio: fio

  # ───────── Расчётные блоки ─────────

  - name: блок_расчёт_сроков
    label: "Расчёт срока и просрочки"
    type: calculator
    calculator: delivery_overdue
    inputs:
      дата_договора: дата_договора
      срок_исполнения_дней: дней_просрочки_числом
      дата_фактического_исполнения: дата_1_поставки
    outputs:
      дата_дедлайна: дата_поставки_расч
      дней_просрочки: кол-во_дней_просрочки_расч
      срок_исполнения_прописью: дней_просрочки_буквами

  - name: блок_расчёт_неустойки
    label: "Расчёт неустойки по договору"
    type: calculator
    calculator: penalty_contract_daily_percent
    inputs:
      сумма_базы: сумма_1_поставки
      процент_в_день: процент_пени_договор
      дней_просрочки: кол-во_дней_просрочки_расч
    outputs:
      пеня_в_день: размер_пени_в_день_расч
      сумма_неустойки: расчетная_сумма_неустойки_расч
      сумма_неустойки_прописью: расчетная_сумма_неустойки_текстом
