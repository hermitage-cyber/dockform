template: 44_аук_4част_пост_претензия.docx
title: "Претензия по просрочке — аукцион 44-ФЗ, четыре частичные поставки на момент заполнения"
description: "После заполнения формируется пакет из трёх документов: претензия + служебная записка + решение."

# Теги анкеты-навигатора. Ветвь «частичные» требует ось количество_частичных.
tags:
  закон: 44
  процедура: аукцион
  тип_поставки: частичные
  количество_частичных: 4

# Пакет из трёх .docx из одной формы (этап 8.8). Переменные общие.
extra_templates:
  - template: 44_аук_част_пост_сз_счет.docx        # общий на все частичные
    output_filename:
      pattern: "СЗ_{наименование_контрагента}_{date}_{time}.docx"
      fields: [наименование_контрагента]
  - template: 44_аук_част_пост_решение.docx        # общий на все частичные
    output_filename:
      pattern: "Решение_{наименование_контрагента}_{date}_{time}.docx"
      fields: [наименование_контрагента]

output_filename:
  pattern: "Претензия_{наименование_контрагента}_{date}_{time}.docx"
  fields: [наименование_контрагента]

fields:

  # ───────── Адресат (контрагент-поставщик) ─────────

  - name: должность_адресата_дат
    label: "Должность руководителя контрагента (дат. падеж)"
    type: text
    required: true
    placeholder: "Генеральному директору"

  - name: наименование_контрагента
    label: "Наименование контрагента"
    type: text
    required: true
    placeholder: "ООО «ПОСТАВЩИК»"

  - name: фио_адресата_дат
    label: "ФИО руководителя контрагента (дат. падеж)"
    type: text
    required: true
    placeholder: "Иванову Михаилу Васильевичу"

  - name: адрес_юр_лица
    label: "Адрес юридического лица"
    type: textarea
    required: true
    help_text: "В соответствии с договором"
 
  - name: почтовый_адрес
    label: "Почтовый адрес"
    type: textarea
    required: false
    help_text: "При наличии. Если пусто — строка в претензии не выводится."
    
  - name: инн
    label: "ИНН"
    type: text
    required: true

  - name: email_контрагента
    label: "Адрес электронной почты"
    type: text
    required: true

  - name: телефон_контрагента
    label: "Телефон"
    type: text
    required: true

  # ───────── Договор ─────────

  - name: номер_договора
    label: "Номер договора"
    type: text
    required: true
    placeholder: "90 ОАЭФ/25М-1461"
    help_text: "без символа N"

  - name: дата_договора
    label: "Дата заключения договора"
    type: date
    required: true

  - name: подписант_договора_заказчика
    label: "Кем подписан договор со стороны Заказчика (для служебной записки)"
    type: textarea
    required: false
    placeholder: "подписан Н.Б. Гришановой по приказу № 1143-к от 27.10.2025 за С.Б. Адаксину"
    help_text: "Только если договор подписан по доверенности/приказу."

  # ───────── Текущая (просроченная) поставка ─────────

  - name: дата_поставки
    label: "Дата поставки на момент составления претензии"
    type: date
    required: true
    help_text: "Дата поставки, по которой выставляется претензия"

  - name: количество_поставки
    label: "Количество в текущей поставке"
    type: number
    required: true

  - name: единица_измерения
    label: "Единица измерения"
    type: text
    required: true
    placeholder: "шт./м./компл. и т.д."

  - name: номер_дата_акта_отв_хранения
    label: "Номер и дата акта приёма на ответственное хранение"
    type: text
    required: false
    placeholder: "б/№ от 27.03.2026"
    help_text: "Если не было акта отв. хранения - оставить поле пустым"

  - name: дата_акта_отв_хранения
    label: "Дата подписания акта отв. хранения Заказчиком"
    type: date
    required: false
    help_text: "Если не было акта отв. хранения - оставить поле пустым"

  - name: номер_дата_документа_приемки
    label: "Номер и дата документа о приёмке"
    type: text
    required: true
    placeholder: "№ 90 от 01.04.2026"

  - name: дата_документа_приемки
    label: "Дата подписания документа о приёмке Заказчиком"
    type: date
    required: true

  # ───────── Срок поставки по контракту ─────────

  - name: срок_поставки_истек
    label: "Срок поставки по контракту истёк (дата)"
    type: date
    required: true
    
  - name: пункт_контракта_срок
    label: "Пункт контракта о сроке поставки"
    type: text
    required: true
    placeholder: "3.1"

  # ───────── Предыдущие частичные поставки (четыре частичные поставки) ─────────

  - name: поставка1_дата
    label: "Частичная поставка №1 — дата"
    type: date
    required: true

  - name: поставка1_количество
    label: "Частичная поставка №1 — количество"
    type: number
    required: true

  - name: поставка1_сумма
    label: "Частичная поставка №1 — сумма, руб."
    type: number
    required: true
    help_text: "Вводить числом"

  - name: поставка2_дата
    label: "Частичная поставка №2 — дата"
    type: date
    required: true

  - name: поставка2_количество
    label: "Частичная поставка №2 — количество"
    type: number
    required: true

  - name: поставка2_сумма
    label: "Частичная поставка №2 — сумма, руб."
    type: number
    required: true
    help_text: "Вводить числом"

  - name: поставка3_дата
    label: "Частичная поставка №3 — дата"
    type: date
    required: true

  - name: поставка3_количество
    label: "Частичная поставка №3 — количество"
    type: number
    required: true

  - name: поставка3_сумма
    label: "Частичная поставка №3 — сумма, руб."
    type: number
    required: true
    help_text: "Вводить числом"

  - name: поставка4_дата
    label: "Частичная поставка №4 (последняя) — дата"
    type: date
    required: true
    help_text: "От неё считается период просрочки до текущей поставки"

  - name: поставка4_количество
    label: "Частичная поставка №4 — количество"
    type: number
    required: true

  - name: поставка4_сумма
    label: "Частичная поставка №4 — сумма, руб."
    type: number
    required: true
    help_text: "Вводить числом"
  # ───────── Цена и пеня ─────────

  - name: цена_контракта
    label: "Цена контракта, руб."
    type: number
    required: true
    placeholder: "1310532,30"
    help_text: ""

  - name: пункт_контракта_неустойка
    label: "Пункт контракта о неустойке (пене)"
    type: text
    required: true
    placeholder: "6.3"

  - name: ставка_цб
    label: "Ставка ЦБ (ключевая), %"
    type: number
    required: true
    placeholder: "14,5"
    help_text: "Действующая на дату расчёта"

  # ───────── Обеспечение (концовка претензии) ─────────

  - name: обеспечение_нг
    label: "Вид обеспечения исполнения контракта"
    type: radio
    required: true
    # value уходит в .docx (truthy/falsy для {#обеспечение_нг}/{^обеспечение_нг}),
    # оператор видит label. «Да»→НГ (независимая гарантия), «Нет»→ПП (удержание деньгами).
    options:
      - { value: "Да", label: "Независимая гарантия (НГ)" }
      - { value: "Нет", label: "Денежные средства (ПП)" }
    help_text: "НГ → концовка про требование по независимой гарантии. ПП → концовка про удержание из обеспечения в виде денежных средств."

  # ───────── Подписант претензии ─────────

  - name: фио_исполнителя
    label: "Исполнитель от ОГЗ"
    type: text
    required: true
    placeholder: "Петрова О.О."

  # ───────── Служебная записка (доп. поле) ─────────

  - name: срок_передачи_счета
    label: "Срок передачи счёта в ОГЗ (для служебной записки)"
    type: date
    required: true
    help_text: "В служебной записке: «СРОК ПЕРЕДАЧИ В ОГЗ СЧЕТА НЕ ПОЗДНЕЕ:»"

  # ───────── Расчётные блоки ─────────
  # Порядок важен: сначала период просрочки (её выход «дней_просрочки» —
  # вход для расчёта пени).

  - name: блок_расчёт_дней
    label: "Период просрочки (от последней поставки до текущей)"
    type: calculator
    calculator: overdue_from_deadline
    inputs:
      дата_дедлайна: поставка4_дата          # последняя предыдущая поставка
      дата_фактического_исполнения: дата_поставки
    outputs:
      дата_дедлайна_формат: дата_посл_поставки_формат  # не используется в .docx, но маппить обязательно
      дней_просрочки: дней_просрочки          # вход для расчёта пени + текст
    display_outputs:
      - дней_просрочки

  - name: блок_расчёт_пени
    label: "Расчёт пени (база = цена − исполненное, 1/300 ставки ЦБ)"
    type: calculator
    calculator: penalty_44fz_partial
    inputs:
      цена_контракта: цена_контракта
      поставка1_сумма: поставка1_сумма
      поставка2_сумма: поставка2_сумма
      поставка3_сумма: поставка3_сумма
      поставка4_сумма: поставка4_сумма
      дней_просрочки: дней_просрочки
      ставка_цб: ставка_цб
    outputs:
      сумма_неустойки: сумма_пени                # «407,26»
      сумма_неустойки_руб: сумма_пени_руб        # «407»
      сумма_неустойки_коп: сумма_пени_коп        # «26»
      сумма_неустойки_прописью: сумма_пени_прописью  # «Четыреста семь рублей»
      сумма_неустойки_коп_прописью: сумма_пени_коп_прописью  # «26 копеек»
      цена_формат: цена_формат                   # «1 310 532,30»
      поставка1_формат: поставка1_формат
      поставка2_формат: поставка2_формат
      поставка3_формат: поставка3_формат
      поставка4_формат: поставка4_формат
      база_формат: база_формат                   # «40 725,60» (= сумма текущей поставки)
      ставка_формат: ставка_формат               # «15»
      расчёт_подробно: расчет_подробно           # не используется в .docx, но маппить обязательно
    display_outputs:
      - расчёт_подробно
      - сумма_неустойки
