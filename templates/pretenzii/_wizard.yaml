# Анкета-навигатор режима «Претензии» (этап 8).
# Единственный источник правды о вопросах. Шаблоны несут только теги (tags:),
# валидатор сшивает их с этой анкетой при старте. Префикс «_» — чтобы
# list_templates не пытался прочитать файл как шаблон.
#
# visible_if у вопроса — тот же DSL, что у полей формы: "поле == 'значение'".

axes:
  - закон
  - процедура
  - тип_поставки
  - количество_частичных

questions:
  - id: закон
    label: "Выберите закон"
    options:
      - { value: 44, label: "44-ФЗ" }
      - { value: 223, label: "223-ФЗ" }

  - id: процедура
    label: "Выберите тип процедуры"
    options:
      - { value: аукцион, label: "Аукцион" }
      - { value: ед_поставщик, label: "Единственный поставщик" }

  - id: тип_поставки
    label: "Первичная поставка или были частичные поставки ранее?"
    options:
      - { value: первая, label: "Первая поставка" }
      - { value: частичные, label: "Были частичные поставки" }

  - id: количество_частичных
    label: "Сколько частичных поставок было?"
    visible_if: "тип_поставки == 'частичные'"
    options:
      - { value: 1, label: "Одна" }
      - { value: 2, label: "Две" }
      - { value: 3, label: "Три" }
      - { value: 4, label: "Четыре" }
