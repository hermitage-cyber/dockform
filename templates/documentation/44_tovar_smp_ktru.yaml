template: 44_tovar_smp_ktru.docx
title: "Документация о закупке (44-ФЗ, СМП, КТРУ)"
description: "Открытый аукцион в электронной форме на поставку товара среди субъектов малого предпринимательства"

# Перед публикацией шаблона нужно поправить в .docx два момента (см. CLAUDE.md):
#   1. Разделители {{ переменная }} → { переменная } (docxtemplater, не docxtpl).
#   2. Заменить составные переменные на условные блоки. Соответствие со старой n8n-логикой:
#        {Запрет1875}        → {#применяется_запрет_1875}текст запрета. Применяется запрет на допуск по 1875-ФЗ для позиций ТЗ: {пункты_тз_запрет_1875}.{/применяется_запрет_1875}{^применяется_запрет_1875}Запрет не применяется.{/применяется_запрет_1875}
#        {Ограничение1875}   → {#применяется_ограничение_1875}текст ограничения. Применяется ограничение на допуск по 1875-ФЗ для позиций ТЗ: {пункты_тз_ограничение_1875}.{/применяется_ограничение_1875}{^применяется_ограничение_1875}Ограничение не применяется.{/применяется_ограничение_1875}
#        {Преференции1875}   → {#применяются_преференции_1875}текст преференций. Применяются преференции на допуск по 1875-ФЗ для позиций ТЗ: {пункты_тз_преференции_1875}.{/применяются_преференции_1875}{^применяются_преференции_1875}Преференции не применяются.{/применяются_преференции_1875}
#        {уголовники}        → {#преимущества_уголовники_11_1}<полный текст по ст. 28 44-ФЗ>{/преимущества_уголовники_11_1}{^преимущества_уголовники_11_1}Не предоставляются.{/преимущества_уголовники_11_1}
#        {инвалиды}          → {#преимущества_инвалиды_11_2}<полный текст по ст. 29 44-ФЗ (ч.1 и ч.2)>{/преимущества_инвалиды_11_2}{^преимущества_инвалиды_11_2}Не предоставляются.{/преимущества_инвалиды_11_2}
#   В n8n тексты «текст по запрету», «текст по ограничениям» и т.п. были заглушками — заменить реальными формулировками при правке docx.

output_filename:
  pattern: "44_СМП_{ИКЗ}_{date}.docx"
  fields: [ИКЗ]

fields:

  # ───────── Базовые реквизиты ─────────

  - name: ИКЗ
    label: "ИКЗ"
    type: text
    required: true
    placeholder: "26 цифр"
    help_text: "Идентификационный код закупки"

  - name: год_закупки
    label: "Год закупки"
    type: dropdown
    options: ["2025", "2026", "2027"]
    required: true

  - name: предмет_им_падеж_с_бол_буквы
    label: "Предмет закупки (именительный падеж, с большой буквы)"
    type: text
    required: true
    placeholder: "Поставка канцелярских товаров"
    help_text: "Используется в заголовках и колонтитулах"

  - name: предмет_предложный_падеж
    label: "Предмет закупки (предложный падеж)"
    type: text
    required: true
    placeholder: "поставке канцелярских товаров"
    help_text: "«на право заключения контракта на ___»"

  - name: место_поставки_индекс_город_итд
    label: "Место поставки (индекс, город, адрес)"
    type: textarea
    required: true

  - name: срок_поставки_до_включительно
    label: "Срок поставки (до ... включительно)"
    type: text
    required: true
    placeholder: "31.12.2026 включительно"

  # ───────── НМЦК ─────────

  - name: нмцк_цифра
    label: "НМЦК (цифрой, ₽)"
    type: number
    required: true

  - name: нмцк_текстом
    label: "НМЦК (прописью)"
    type: text
    required: true

  # ───────── Подписант (заместитель) ─────────

  - name: зам
    label: "Заместитель (подписант)"
    type: dictionary
    source: deputies
    display: "{fio} ({position})"
    fills:
      должн_по_направлению: position
      Фам_Имя_Отч_зама_им_пад: fio_im
      И_О_Фамилия_зама: fio_short

  - name: должн_по_направлению
    label: "Должность зама — авто, можно править"
    type: text
    required: true

  - name: Фам_Имя_Отч_зама_им_пад
    label: "ФИО зама (им.п.) — авто, можно править"
    type: text
    required: true

  - name: И_О_Фамилия_зама
    label: "И.О. Фамилия зама (короткая форма) — авто, можно править"
    type: text
    required: true
    placeholder: "И.И. Иванов"
    help_text: "Для подписи на титульной странице. В справочнике deputies нужен ключ fio_short, иначе поле заполняется вручную"

  # ───────── Запрет по 1875-ФЗ ─────────

  - name: применяется_запрет_1875
    label: "Применяется запрет по 1875-ФЗ?"
    type: radio
    options: ["Да", "Нет"]
    required: true

  - name: пункты_тз_запрет_1875
    label: "Пункты ТЗ, попадающие под запрет по 1875-ФЗ"
    type: text
    visible_if: "применяется_запрет_1875 == 'Да'"
    placeholder: "1.1, 2.3, 5"

  # ───────── Ограничение по 1875-ФЗ ─────────

  - name: применяется_ограничение_1875
    label: "Применяется ограничение по 1875-ФЗ?"
    type: radio
    options: ["Да", "Нет"]
    required: true

  - name: пункты_тз_ограничение_1875
    label: "Пункты ТЗ, попадающие под ограничение по 1875-ФЗ"
    type: text
    visible_if: "применяется_ограничение_1875 == 'Да'"

  # ───────── Преференции по 1875-ФЗ ─────────

  - name: применяются_преференции_1875
    label: "Применяются преференции по 1875-ФЗ?"
    type: radio
    options: ["Да", "Нет"]
    required: true

  - name: пункты_тз_преференции_1875
    label: "Пункты ТЗ, попадающие под преференции по 1875-ФЗ"
    type: text
    visible_if: "применяются_преференции_1875 == 'Да'"

  # ───────── Преимущества (ст. 28 / ст. 29) ─────────

  - name: преимущества_уголовники_11_1
    label: "Преимущества учреждениям/предприятиям УИС (п. 11.1, ст. 28 44-ФЗ)?"
    type: radio
    options: ["Да", "Нет"]
    required: true

  - name: преимущества_инвалиды_11_2
    label: "Преимущества организациям инвалидов (п. 11.2, ст. 29 44-ФЗ)?"
    type: radio
    options: ["Да", "Нет"]
    required: true

  # ───────── Обеспечение заявки ─────────

  - name: обеспечение_заявки_цифра
    label: "Обеспечение заявки (цифрой, ₽)"
    type: number
    required: true

  - name: обеспечение_заявки_текст
    label: "Обеспечение заявки (прописью)"
    type: text
    required: true

  # Эти два поля используются только при УИС/инвалидах (0,5 % НМЦК).
  # visible_if не поддерживает OR, поэтому поля показываются всегда и не обязательны.
  # В docx их вывод должен быть внутри условного блока,
  # например {#преимущества_инвалиды_11_2}…{/преимущества_инвалиды_11_2} или его аналога.
  - name: обеспечение_заявки_инвалид_уголов_цифра
    label: "Обеспечение заявки для УИС/инвалидов, 0,5 % НМЦК (цифрой, ₽)"
    type: number
    help_text: "Заполнить, только если выбраны преимущества по п. 11.1 или п. 11.2"

  - name: обеспечение_заявки_инвалид_уголов_текст
    label: "Обеспечение заявки для УИС/инвалидов (прописью)"
    type: text
    help_text: "Заполнить, только если выбраны преимущества по п. 11.1 или п. 11.2"

  # ───────── Обеспечение исполнения контракта / гарантийных обязательств ─────────

  - name: оик_цифра_процентов
    label: "Размер ОИК (% от цены контракта)"
    type: number
    required: true

  - name: размер_ого_цифра
    label: "Размер ОГО (цифрой, ₽)"
    type: number
    required: true
    help_text: "10 % от НМЦК"

  - name: размер_ого_текст
    label: "Размер ОГО (прописью)"
    type: text
    required: true
