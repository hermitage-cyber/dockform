template: test.docx
title: "Тестовый шаблон"
description: "Для проверки этапов 2–5: рендер формы, генерация .docx, dictionary."
output_filename:
  pattern: "test_{date}_{time}.docx"
  fields: []
fields:
  - name: имя
    label: "Имя"
    type: text
    required: true

  - name: пол
    label: "Пол"
    type: radio
    options: ["Мужской", "Женский"]
    required: true

  - name: указать_отчество
    label: "Указать отчество?"
    type: radio
    options: ["Да", "Нет"]

  - name: отчество
    label: "Отчество"
    type: text
    visible_if: "указать_отчество == 'Да'"

  - name: возраст
    label: "Возраст (полных лет)"
    type: number
    required: true

  - name: дата_рождения
    label: "Дата рождения"
    type: date

  - name: страна
    label: "Страна"
    type: dropdown
    options: ["Россия", "Беларусь", "Казахстан"]
    required: true

  - name: зам
    label: "Заместитель"
    type: dictionary
    source: deputies
    display: "{fio} ({position})"
    fills:
      Фам_Имя_Отч_зама_им_пад: fio_im
      Фам_Имя_Отч_зама_род_пад: fio_rod
      должность_зама: position

  - name: Фам_Имя_Отч_зама_им_пад
    label: "ФИО зама (им.п.) — заполнится автоматически, можно править"
    type: text

  - name: Фам_Имя_Отч_зама_род_пад
    label: "ФИО зама (род.п.) — заполнится автоматически, можно править"
    type: text

  - name: должность_зама
    label: "Должность зама — заполнится автоматически, можно править"
    type: text

  - name: указать_комментарий
    label: "Указать комментарий?"
    type: radio
    options: ["Да", "Нет"]

  - name: комментарий
    label: "Комментарий"
    type: textarea
    visible_if: "указать_комментарий != 'Нет'"
